<div id="wheelBox" class="fn-area">
    <div class="ultimate-wheel-wrapper">
        
        <!-- Header: រីកធំបំផុត (Extra Large) -->
        <div class="wheel-header">
            <h3 class="wheel-title">កង់បង្វិលសំណាង</h3>
            <button class="add-name-btn" onclick="showNamePanel()">
                <i class="fas fa-plus-circle"></i> បញ្ចូលឈ្មោះ
            </button>
        </div>

        <!-- Main Body -->
        <div class="wheel-body">
            <div class="wheel-container">
                <div class="pointer-fixed"></div>
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
                <div class="spin-btn-fixed" onclick="spinWheel()">SPIN</div>
            </div>
        </div>

        <!-- Popup បញ្ចូលឈ្មោះ: កែឱ្យរីកពេញអេក្រង់ទូរសព្ទ (Full Screen) -->
        <div id="namePanel" class="modal-full">
            <div class="modal-box-full">
                <div class="modal-header-big">
                    <h2 style="margin:0; font-size: 32px; color: #ff1493;">បញ្ជីឈ្មោះ</h2>
                    <button onclick="clearAllNames()" class="btn-clear-big">លុបទាំងអស់</button>
                </div>
                
                <div class="input-wrap-big">
                    <input type="text" id="newName" placeholder="វាយឈ្មោះនៅទីនេះ...">
                    <button onclick="addName()">ថែម</button>
                </div>

                <div class="list-container-big">
                    <ul id="nameList"></ul>
                </div>

                <div class="modal-footer-big">
                    <button class="btn-primary-big" onclick="hideNamePanel()">រួចរាល់</button>
                </div>
            </div>
        </div>

        <!-- Popup អ្នកឈ្នះ -->
        <div id="winnerPanel" class="modal-full" style="background: rgba(0,0,0,0.95);">
            <div class="winner-box-big">
                <h1 style="color:#333; margin-top:0; font-size: 35px;">🎉 អបអរសាទរ 🎉</h1>
                <div id="winnerNameDisplay" class="winner-name-text-big">---</div>
                <button class="btn-primary-big" onclick="closeWinner()">បិទ</button>
            </div>
        </div>
    </div>

    <style>
        /* រចនាប័ទ្មរួម */
        .ultimate-wheel-wrapper {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ff1493; display: flex; flex-direction: column;
            overflow: hidden; font-family: 'Battambang', Arial;
        }

        /* 👑 Header ធំពិសេស */
        .wheel-header {
            flex: 0 0 auto; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .wheel-title { 
            color: yellow; margin: 0; font-size: 38px; font-weight: 900; 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5); 
        }
        .add-name-btn { 
            padding: 18px 40px; border-radius: 50px; border: 4px solid white; 
            background: white; color: #ff1493; font-weight: 900; 
            font-size: 26px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); cursor: pointer;
        }

        /* កង់បង្វិល */
        .wheel-body { flex: 1; display: flex; align-items: center; justify-content: center; }
        .wheel-container { position: relative; width: 96vw; height: 96vw; max-width: 90vh; max-height: 90vh; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid white; background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .spin-btn-fixed {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 22%; height: 22%; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #ff1493; border: 6px solid #ff1493;
            font-size: clamp(18px, 7vw, 30px); z-index: 50; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .pointer-fixed {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent;
            border-right: 25px solid transparent; border-top: 60px solid yellow;
            z-index: 60; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* 👑 ផ្ទាំងបញ្ចូលឈ្មោះរីកពេញអេក្រង់ */
        .modal-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 2000; }
        .modal-box-full { width: 100%; height: 100%; display: flex; flex-direction: column; background: #fdfdfd; }
        
        .modal-header-big { padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
        .btn-clear-big { background: #ff4444; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 18px; font-weight: bold; }

        .input-wrap-big { padding: 20px; display: flex; gap: 15px; background: #fff; }
        .input-wrap-big input { flex: 1; padding: 25px; border: 3px solid #ff1493; border-radius: 20px; font-size: 24px; outline: none; }
        .input-wrap-big button { padding: 0 40px; background: #ff1493; color: white; border: none; border-radius: 20px; font-size: 24px; font-weight: bold; }

        .list-container-big { flex: 1; overflow-y: auto; padding: 10px 20px; }
        #nameList li { display: flex; justify-content: space-between; padding: 25px; background: #fff; border: 2px solid #eee; margin-bottom: 15px; border-radius: 20px; font-size: 28px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }

        .modal-footer-big { padding: 20px; border-top: 1px solid #eee; }
        .btn-primary-big { width: 100%; padding: 25px; background: #ff1493; color: white; border: none; border-radius: 25px; font-size: 28px; font-weight: bold; box-shadow: 0 6px 20px rgba(255,20,147,0.4); }

        /* ផ្ទាំងអ្នកឈ្នះធំ */
        .winner-box-big { background: white; width: 90%; max-width: 500px; border-radius: 50px; padding: 60px 30px; text-align: center; border: 5px solid #ff1493; margin: auto; }
        .winner-name-text-big { font-size: 85px; font-weight: bold; color: #ff1493; margin: 40px 0; text-shadow: 4px 4px 0px #eee; }

        /* Landscape */
        @media (orientation: landscape) {
            .ultimate-wheel-wrapper { position: absolute; overflow-y: auto; }
            .wheel-header { padding: 15px 30px; }
            .wheel-title { font-size: 28px; }
            .add-name-btn { padding: 10px 30px; font-size: 20px; }
            .input-wrap-big input { padding: 15px; font-size: 20px; }
        }
    </style>

    <script>
        let names = ["ហេង", "សំណាង", "លាភ", "ជ័យ", "មាស", "ប្រាក់"];
        const colors = ["#ff1493", "#333333", "#ff69b4", "#1a1a1a", "#ff007f", "#444444"];
        let startAngle = 0;
        let isSpinning = false;

        function drawWheel() {
            const canvas = document.getElementById("wheelCanvas");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            const size = canvas.width;
            const center = size / 2;
            const radius = center - 20;
            ctx.clearRect(0, 0, size, size);
            
            if(names.length === 0) return;
            const arc = Math.PI / (names.length / 2);

            names.forEach((name, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath(); ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arc, false);
                ctx.fill();
                
                ctx.save();
                ctx.fillStyle = "white"; ctx.translate(center, center); ctx.rotate(angle + arc/2);
                ctx.textAlign = "right"; ctx.textBaseline = "middle";
                ctx.font = "bold 34px Battambang, Arial";
                ctx.fillText(name, radius - 70, 0);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            let duration = 4500;
            let start = null;
            let initialRotation = startAngle;
            let totalRotation = Math.PI * 15 + Math.random() * Math.PI * 8;

            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let ease = 1 - Math.pow(1 - progress / duration, 4);
                startAngle = initialRotation + totalRotation * ease;
                drawWheel();
                if (progress < duration) requestAnimationFrame(animate);
                else { isSpinning = false; checkWinner(); }
            }
            requestAnimationFrame(animate);
        }

        function checkWinner() {
            const arc = Math.PI / (names.length / 2);
            const degrees = (startAngle * 180 / Math.PI) + 90;
            const index = Math.floor((360 - (degrees % 360)) / (arc * 180 / Math.PI)) % names.length;
            document.getElementById('winnerNameDisplay').innerText = names[index];
            document.getElementById('winnerPanel').style.display = 'flex';
        }

        function closeWinner() { document.getElementById('winnerPanel').style.display = 'none'; }
        function showNamePanel() { document.getElementById('namePanel').style.display = 'flex'; updateList(); }
        function hideNamePanel() { document.getElementById('namePanel').style.display = 'none'; drawWheel(); }
        
        function addName() {
            let val = document.getElementById('newName').value.trim();
            if(val) { names.push(val); document.getElementById('newName').value = ""; updateList(); }
        }
        function removeName(i) { names.splice(i, 1); updateList(); }
        function clearAllNames() { if(confirm("តើអ្នកចង់លុបឈ្មោះទាំងអស់មែនទេ?")) { names = []; updateList(); } }
        
        function updateList() {
            const list = document.getElementById('nameList');
            list.innerHTML = names.map((n, i) => `<li>${n} <span style="color:red; font-size:35px; cursor:pointer;" onclick="removeName(${i})">✕</span></li>`).join('');
        }

        window.onload = drawWheel;
        window.addEventListener('resize', drawWheel);
    </script>
</div>
