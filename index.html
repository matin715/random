<div id="wheelBox" class="fn-area">
    <div class="ultimate-wheel-wrapper">
        
        <div class="wheel-header">
            <h3 class="wheel-title-fixed">កង់បង្វិលផ្សងសំណាង</h3>
            <button class="add-name-fixed" onclick="showNamePanel()">
                <i class="fas fa-plus-circle"></i> បញ្ចូលឈ្មោះ
            </button>
        </div>

        <div class="wheel-main-content">
            <div class="wheel-responsive-box">
                <div class="pointer-fixed"></div>
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="spin-btn-fixed" onclick="spinWheel()">SPIN</div>
            </div>
        </div>

        <!-- Popup បញ្ចូលឈ្មោះ -->
        <div id="namePanel" class="modal-full">
            <div class="modal-box-dynamic">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin:0; font-size: 18px;">បញ្ជីឈ្មោះ</h3>
                    <button onclick="clearAllNames()" class="btn-clear-fast">លុបទាំងអស់</button>
                </div>
                <div class="input-wrap">
                    <input type="text" id="newName" placeholder="ឈ្មោះ...">
                    <button onclick="addName()">ថែម</button>
                </div>
                <div class="list-container"><ul id="nameList"></ul></div>
                <button class="btn-done-full" onclick="hideNamePanel()">រួចរាល់</button>
            </div>
        </div>

        <!-- Popup អ្នកឈ្នះ -->
        <div id="winnerPanel" class="modal-full" style="background: rgba(0,0,0,0.9);">
            <div class="winner-box">
                <h2 style="margin-top:0">🎉 អបអរសាទរ!</h2>
                <div id="winnerNameDisplay" class="winner-name-text">---</div>
                <button class="btn-done-full" onclick="closeWinner()">បង្វិលម្តងទៀត</button>
            </div>
        </div>
    </div>

    <style>
        .ultimate-wheel-wrapper {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ff1493; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; z-index: 9999;
            font-family: 'Battambang', Arial, sans-serif;
        }

        .wheel-header {
            width: 100%; padding: 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 100;
        }

        .wheel-title-fixed { color: yellow; margin: 0; font-size: 18px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .add-name-fixed {
            padding: 8px 15px; border-radius: 20px; background: white;
            border: none; color: #ff1493; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 14px;
        }

        .wheel-main-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px; position: relative;
        }

        /* 👑 កែទំហំឱ្យរីកធំពេញអេក្រង់ (92vmin) */
        .wheel-responsive-box {
            position: relative; 
            width: 92vmin; height: 92vmin;
            max-width: 500px; max-height: 500px;
            display: flex; align-items: center; justify-content: center;
        }

        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            border: 5px solid white; box-shadow: 0 0 25px rgba(0,0,0,0.4);
            background: #fff;
        }

        .spin-btn-fixed {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #ff1493; border: 4px solid #ff1493;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px; z-index: 50;
        }

        .pointer-fixed {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 30px solid yellow;
            z-index: 60; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* 📱 ការពារពេលផ្ដេកទូរសព្ទ (Landscape) កុំឱ្យដាច់ក្រោម */
        @media (orientation: landscape) and (max-height: 500px) {
            .wheel-title-fixed { display: none; }
            .wheel-header { padding: 5px 20px; }
            .wheel-responsive-box { width: 75vh; height: 75vh; } /* រួមតូចតាមកម្ពស់អេក្រង់ */
            .spin-btn-fixed { width: 55px; height: 55px; font-size: 14px; }
        }

        /* Styles សម្រាប់ Popups */
        .modal-full {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; 
            justify-content: center; z-index: 2000;
        }
        .modal-box-dynamic {
            background: white; width: 85%; max-width: 380px; max-height: 80vh;
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column;
        }
        .input-wrap { display: flex; gap: 5px; margin-bottom: 10px; }
        .input-wrap input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .input-wrap button { background: #ff1493; color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; }
        .list-container { flex: 1; overflow-y: auto; margin-bottom: 15px; border-top: 1px solid #eee; }
        #nameList { list-style: none; padding: 0; margin: 0; }
        #nameList li { display: flex; justify-content: space-between; padding: 10px; background: #f9f9f9; margin-top: 5px; border-radius: 8px; }
        .btn-clear-fast { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; }
        .btn-done-full { width: 100%; padding: 12px; background: #ff1493; color: white; border: none; border-radius: 12px; font-weight: bold; }
        .winner-box { background: white; width: 80%; max-width: 320px; border-radius: 25px; padding: 25px; text-align: center; }
        .winner-name-text { font-size: 35px; font-weight: bold; color: #ff1493; margin: 15px 0; }
    </style>

    <script>
        let names = ["ហេង", "សំណាង", "លាភ", "ជ័យ", "មាស", "ប្រាក់"];
        const colors = ["#ff1493", "#333333", "#ff69b4", "#1a1a1a", "#ff007f", "#444444"];
        let startAngle = 0;
        let isSpinning = false;

        function drawWheel() {
            const canvas = document.getElementById("wheelCanvas");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            const size = canvas.width;
            const center = size / 2;
            const radius = center - 10;
            ctx.clearRect(0, 0, size, size);
            
            if(names.length === 0) return;

            const arc = Math.PI / (names.length / 2);
            names.forEach((name, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath(); ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arc, false);
                ctx.fill();
                
                ctx.save();
                ctx.fillStyle = "white"; ctx.translate(center, center); ctx.rotate(angle + arc/2);
                ctx.textAlign = "right"; ctx.textBaseline = "middle";
                ctx.font = "bold 24px Battambang, Arial";
                ctx.fillText(name, radius - 40, 0);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            let duration = 4000;
            let start = null;
            let initialRotation = startAngle;
            let totalRotation = Math.PI * 10 + Math.random() * Math.PI * 5;

            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let ease = 1 - Math.pow(1 - progress / duration, 3);
                startAngle = initialRotation + totalRotation * ease;
                drawWheel();
                if (progress < duration) requestAnimationFrame(animate);
                else { isSpinning = false; checkWinner(); }
            }
            requestAnimationFrame(animate);
        }

        function checkWinner() {
            const arc = Math.PI / (names.length / 2);
            const degrees = (startAngle * 180 / Math.PI) + 90;
            const index = Math.floor((360 - (degrees % 360)) / (arc * 180 / Math.PI)) % names.length;
            document.getElementById('winnerNameDisplay').innerText = names[index];
            document.getElementById('winnerPanel').style.display = 'flex';
        }

        function closeWinner() { document.getElementById('winnerPanel').style.display = 'none'; }
        function showNamePanel() { document.getElementById('namePanel').style.display = 'flex'; updateList(); }
        function hideNamePanel() { document.getElementById('namePanel').style.display = 'none'; drawWheel(); }
        function addName() {
            let val = document.getElementById('newName').value.trim();
            if(val) { names.push(val); document.getElementById('newName').value = ""; updateList(); }
        }
        function removeName(i) { names.splice(i, 1); updateList(); }
        function clearAllNames() { names = []; updateList(); }
        function updateList() {
            const list = document.getElementById('nameList');
            list.innerHTML = names.map((n, i) => `<li>${n} <span style="color:red; font-weight:bold;" onclick="removeName(${i})">✕</span></li>`).join('');
        }

        window.onload = drawWheel;
        window.onresize = drawWheel;
    </script>
</div>
