<div id="wheelBox" class="fn-area">
    <div class="ultimate-wheel-wrapper">
        
        <!-- Header Section -->
        <div class="wheel-header">
            <h3 class="wheel-title">កង់បង្វិលសំណាង</h3>
            <button class="add-name-btn" onclick="showNamePanel()">
                <i class="fas fa-plus-circle"></i> បញ្ចូលឈ្មោះ
            </button>
        </div>

        <hr class="full-divider"> <!-- បន្ទាត់វែងពេញអេក្រង់ -->

        <!-- Main Body -->
        <div class="wheel-body-container">
            <div class="wheel-section">
                <div class="wheel-container">
                    <div class="pointer-fixed"></div>
                    <canvas id="wheelCanvas" width="800" height="800"></canvas>
                    <div class="spin-btn-fixed" onclick="spinWheel()">SPIN</div>
                </div>
            </div>

            <!-- បញ្ជីអ្នកឈ្នះ -->
            <div id="historySection" class="winners-history-section" style="display: none;">
                <div class="history-title">🏆 បញ្ជីអ្នកឈ្នះ</div>
                <div id="winnersLog" class="winners-log-list"></div>
            </div>
        </div>

        <!-- Popup បញ្ចូលឈ្មោះ -->
        <div id="namePanel" class="modal-full">
            <div class="modal-box-full">
                <div class="modal-header-big">
                    <h2 style="margin:0; font-size: 26px; color: #ff1493;">បញ្ជីឈ្មោះ</h2>
                    <button onclick="clearAllNames()" class="btn-clear-big">លុបទាំងអស់</button>
                </div>
                <hr class="full-divider">
                <div class="input-wrap-big">
                    <input type="text" id="newName" placeholder="វាយឈ្មោះ...">
                    <button onclick="addName()">ថែម</button>
                </div>
                <div class="list-container-big"><ul id="nameList"></ul></div>
                <hr class="full-divider">
                <div class="modal-footer-big">
                    <button class="btn-primary-big" onclick="hideNamePanel()">រួចរាល់</button>
                </div>
            </div>
        </div>

        <!-- Popup អ្នកឈ្នះ -->
        <div id="winnerPanel" class="modal-full-winner" style="display: none;">
            <div class="winner-box-big">
                <h1 style="color:#333; margin:0; font-size: 28px;">🎊 អបអរសាទរ! 🎊</h1>
                <div id="winnerNameDisplay" class="winner-name-text-big">---</div>
                <hr class="full-divider" style="margin: 20px 0;">
                <button class="btn-primary-big" onclick="closeWinner()">បិទ</button>
            </div>
        </div>
    </div>

    <style>
        /* Container រួម */
        .ultimate-wheel-wrapper {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ff1493; display: flex; flex-direction: column;
            overflow-x: hidden; overflow-y: auto; font-family: 'Battambang', Arial;
        }

        /* បន្ទាត់វែងពេញអេក្រង់ */
        .full-divider {
            width: 100%; border: 0; height: 2px; background: rgba(255,255,255,0.3); margin: 0;
        }
        #namePanel .full-divider { background: #eee; }

        .wheel-header {
            flex: 0 0 auto; padding: 12px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .wheel-title { color: yellow; margin: 0; font-size: 24px; font-weight: 900; }
        .add-name-btn { padding: 10px 20px; border-radius: 25px; border: 2px solid white; background: white; color: #ff1493; font-weight: bold; font-size: 16px; }

        .wheel-body-container { flex: 1; display: flex; flex-direction: column; align-items: center; }

        /* 👑 កង់បង្វិលឱ្យពេញអេក្រង់គ្រប់ទម្រង់ */
        .wheel-section {
            width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px 0;
        }
        .wheel-container {
            position: relative;
            /* កំណត់ទំហំតាមអេក្រង់៖ បើបញ្ឈរយកទទឹង បើផ្ដេកយកកម្ពស់ */
            width: 96vw; height: 96vw;
            max-width: 85vh; max-height: 85vh; 
        }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; background: #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }

        .spin-btn-fixed {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20%; height: 20%; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #ff1493; border: 3px solid #ff1493;
            font-size: 18px; z-index: 50;
        }

        .pointer-fixed {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 18px solid transparent;
            border-right: 18px solid transparent; border-top: 45px solid yellow;
            z-index: 60; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        /* បញ្ជីអ្នកឈ្នះ */
        .winners-history-section {
            width: 96%; background: rgba(255, 255, 255, 0.15);
            margin: 10px 0; border-radius: 15px; border: 1px solid white;
        }
        .history-title { padding: 10px; text-align: center; color: white; font-weight: bold; font-size: 18px; }
        .winners-log-list { padding: 10px; }
        .winner-item {
            background: white; padding: 12px; border-radius: 10px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            font-size: 18px; font-weight: bold; color: #333;
        }

        /* Modals */
        .modal-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 2000; flex-direction: column; }
        .modal-full-winner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 3000; align-items: center; justify-content: center; }
        .modal-box-full { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .modal-header-big { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .input-wrap-big { padding: 15px; display: flex; gap: 8px; }
        .input-wrap-big input { flex: 1; padding: 15px; border: 2px solid #ff1493; border-radius: 10px; font-size: 18px; outline: none; }
        .input-wrap-big button { padding: 0 25px; background: #ff1493; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; }
        .list-container-big { flex: 1; overflow-y: auto; padding: 10px; }
        #nameList li { display: flex; justify-content: space-between; padding: 15px; background: #f9f9f9; margin-bottom: 8px; border-radius: 10px; font-size: 20px; font-weight: bold; border: 1px solid #eee; }
        .modal-footer-big { padding: 10px; }
        .btn-primary-big { width: 100%; padding: 18px; background: #ff1493; color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; }
        .btn-clear-big { background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; }

        .winner-box-big { background: white; width: 90%; max-width: 450px; padding: 30px 15px; border-radius: 30px; text-align: center; }
        .winner-name-text-big { font-size: 55px; font-weight: bold; color: #ff1493; margin: 20px 0; }

        /* Support for Horizontal (ផ្ដេក) */
        @media (orientation: landscape) {
            .wheel-header { padding: 5px 15px; }
            .wheel-container { width: 70vh; height: 70vh; }
            .wheel-title { font-size: 20px; }
        }
    </style>

    <script>
        let names = ["ហេង", "សំណាង", "លាភ", "ជ័យ", "មាស", "ប្រាក់"];
        let winnerHistory = [];
        const colors = ["#ff1493", "#333333", "#ff69b4", "#1a1a1a", "#ff007f", "#444444"];
        let startAngle = 0;
        let isSpinning = false;

        function drawWheel() {
            const canvas = document.getElementById("wheelCanvas");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            const size = canvas.width;
            const center = size / 2;
            const radius = center - 10;
            ctx.clearRect(0, 0, size, size);
            if(names.length === 0) return;
            const arc = Math.PI / (names.length / 2);
            names.forEach((name, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath(); ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arc, false);
                ctx.fill();
                ctx.save();
                ctx.fillStyle = "white"; ctx.translate(center, center); ctx.rotate(angle + arc/2);
                ctx.textAlign = "right"; ctx.textBaseline = "middle";
                ctx.font = "bold 40px Battambang, Arial";
                ctx.fillText(name, radius - 60, 0);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            let duration = 4000;
            let start = null;
            let initialRotation = startAngle;
            let totalRotation = Math.PI * 12 + Math.random() * Math.PI * 6;
            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let ease = 1 - Math.pow(1 - progress / duration, 3);
                startAngle = initialRotation + totalRotation * ease;
                drawWheel();
                if (progress < duration) requestAnimationFrame(animate);
                else { isSpinning = false; checkWinner(); }
            }
            requestAnimationFrame(animate);
        }

        function checkWinner() {
            const arc = Math.PI / (names.length / 2);
            const degrees = (startAngle * 180 / Math.PI) + 90;
            const index = Math.floor((360 - (degrees % 360)) / (arc * 180 / Math.PI)) % names.length;
            const winner = names[index];
            winnerHistory.unshift(winner); 
            document.getElementById('historySection').style.display = 'block';
            updateWinnerLog();
            document.getElementById('winnerNameDisplay').innerText = winner;
            document.getElementById('winnerPanel').style.display = 'flex';
        }

        function updateWinnerLog() {
            const logBox = document.getElementById('winnersLog');
            logBox.innerHTML = winnerHistory.map((name, i) => `
                <div class="winner-item">
                    <span>${winnerHistory.length - i}. ${name}</span>
                    <span>🎊</span>
                </div>
            `).join('');
        }

        function closeWinner() { document.getElementById('winnerPanel').style.display = 'none'; }
        function showNamePanel() { document.getElementById('namePanel').style.display = 'flex'; updateList(); }
        function hideNamePanel() { document.getElementById('namePanel').style.display = 'none'; drawWheel(); }
        function addName() {
            let val = document.getElementById('newName').value.trim();
            if(val) { names.push(val); document.getElementById('newName').value = ""; updateList(); }
        }
        function removeName(i) { names.splice(i, 1); updateList(); }
        function clearAllNames() { 
            if(confirm("លុបឈ្មោះទាំងអស់?")) {
                names = []; winnerHistory = []; 
                document.getElementById('historySection').style.display = 'none'; 
                updateWinnerLog(); updateList(); 
            }
        }
        function updateList() {
            const list = document.getElementById('nameList');
            list.innerHTML = names.map((n, i) => `<li>${n} <span style="color:red;" onclick="removeName(${i})">✕</span></li>`).join('');
        }

        window.onload = drawWheel;
        window.addEventListener('resize', drawWheel);
    </script>
</div>
